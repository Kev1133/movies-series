        <div class="center1">
            <h1>CONTÁCTANOS</h1>
            <p>Envíanos un correo electrónico y nosotros te responderemos lo antes posible.</p>
        </div>
        <div class="contact">
            <form action="#" method="post" enctype="text/plain">
                <label for="name">Nombre:</label><br>
                <input type="text" id="name" name="name" required><br><br>
                <label for="email">Correo electrónico:</label><br>
                <input type="email" id="email" name="email" required><br><br>
                <label for="message">Mensaje:</label><br>
                <textarea id="message" name="message" rows="4" cols="50" required></textarea><br><br>
                <input type="submit" value="Enviar">
            </form>

            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d440732.7020574549!2d-82.01275757067523!3d30.34457653949481!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x88e5b716f1ceafeb%3A0xc4cd7d3896fcc7e2!2sJacksonville%2C%20Florida%2C%20EE.%20UU.!5e0!3m2!1ses-419!2sdo!4v1772610487494!5m2!1ses-419!2sdo"
